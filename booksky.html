<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="booksky.css">
    
</head>
<style>
    *{
    margin: 0px;
    padding: 0px;
}
body{
    font-family: 'poppins', sans-serif ;
}
.navbar{
    background-color: #fd6569;
    padding: 10px;
}
.container{
    padding: 10px;
    
}

.book-container{
    padding: 15px;
    width: 25%;
    background-color: black;
    border-radius: 10px;
    color: white;
    margin: 30px;
    
}

.book-container h2{
    color: #fd6569;
}

.book-container button{
    background-color: #fd6569;
    color: black;
    padding-top: 5px;
    padding-bottom: 5px;
    padding-right: 10px;
    padding-left: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin-top: 15px;

}

.add-button{
    background-color: #fd6569;
    color: black;
    padding-top: 20px;
    padding-bottom: 20px;
    padding-right: 30px;
    padding-left: 30px;
    border-radius: 100%;
    border: none;
    cursor: pointer;
    position: fixed;
    right: 20px;
    bottom: 30px;
    font-size: 40px;
}
.popup-overlay{
    background-color: black;
    opacity: 0.8;
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0px;
    top: 0px;
    z-index: 1;
    display: none;
}

.popup-box{
    background: #fd6569;
    width: 40%;
    padding: 40px;
    border-radius: 10px;
    position: absolute;
    left: 30%;
    top: 30%;
    z-index: 2;
    display: none;
}

.popup-box input{
    background-color: transparent;
    width: 100%;
    margin: 5px;
    padding: 5px;
    border: none;
    font-size: 20px;
    border-bottom: solid black 1px;
    color: white;
}

.popup-box textarea{
    background-color: transparent;
    width: 100%;
    margin: 5px;
    padding: 5px;
    border: none;
    font-size: 20px;
    border-bottom: solid black 1px;
    color: white;
}

.popup-box input::placeholder{
    color: black;
}

.popup-box textarea::placeholder{
    color: black;
}

.popup-box button{
    background-color: black;
    color: white;
    padding-left: 20px;
    padding-right: 20px;
    border: none;
    padding-top: 10px;
    padding-bottom: 10px;
    margin: 5px;
    border-radius: 30px;

}

.popup-box input:focus{
    outline: none;
}

.popup-box textarea:focus{
    outline: none;
}
</style>
<body>
    <div class="navbar">
        <h1>BookSky</h1>
    </div>

    <div class="container">
        <div class="book-container">
            <h2>Rich Dad Poor Dad</h2>
            <h5>Robert Kiyosaki</h5>
            <p>Rich Dad Poor Dad is a book that teaches financial literacy and the importance of investing in assets.</p>
            <button onclick="deletebook(event)">Delete</button>
        </div>
    </div>

    <div class="popup-box">
            <h2>Add Book</h2>
            <form>
                <input type="text" placeholder="Book Title" id="book-title-input">
                <input type="text" placeholder="Book Author" id="book-author-input">
                <textarea placeholder="Short Description" id="book-description-input"></textarea>
                <button id="add-book">ADD</button>
                <button id="cancel-popup">CANCEL</button>
            </form>
        </div>

    <button class="add-button" id="add-pop-button">+</button>
    <div class="popup-overlay">
        
    </div>
</body>
<script>
    var popupbox = document.querySelector(".popup-box")
    var popupoverlay = document.querySelector(".popup-overlay")
    var addbutton = document.getElementById("add-pop-button")

    addbutton.addEventListener("click", function(){
        popupoverlay.style.display = "block"
        popupbox.style.display = "block"
    })

    var container = document.querySelector(".container")
    var booktitle = document.getElementById("book-title-input")
    var bookauthor = document.getElementById("book-author-input")
    var bookdescription = document.getElementById("book-description-input")
    var addbook = document.getElementById("add-book")

    addbook.addEventListener("click", function(event){
        event.preventDefault()
        var div = document.createElement("div")
        div.setAttribute("class", "book-container")
        div.innerHTML = `<h2>${booktitle.value}</h2>
            <h5>${bookauthor.value}</h5>
            <p>${bookdescription.value}</p>
            <button onclick="deletebook(event)">Delete</button>`
            container.append(div)
            popupoverlay.style.display = "none"
            popupbox.style.display = "none"
             
    })

    function deletebook(event){
        event.target.parentElement.remove()
    }


</script>
</html>
